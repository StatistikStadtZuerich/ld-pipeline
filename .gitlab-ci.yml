include:
  - project: 'cmp-common/cmp-build-common'
    ref: 'release/2.10'
    file: 'gitlab-ci-template.yaml'

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - prepare
  - test
  - package
  - publish

generate-version:
  extends: .determine-build-version
  stage: prepare

python-test:
  stage: test
  image: ${DOCKER_HUB_PROXY}library/python:3.12
  needs:
    - generate-version
  cache:
    - key: "pip-$CI_JOB_IMAGE"
      paths:
        - .cache/pip/
  before_script:
    - mkdir -p reports
    - python -c "import sys; print(sys.version)"
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - ruff format --check
    - ruff check --output-format=gitlab > reports/code-quality-report.json
    - SSZ_DB_TYPE=mock python -m pytest --doctest-modules --junitxml=reports/unittest-results.xml tests/unit
  variables:
    HTTP_PROXY: "${DEV_PROXY}"
    HTTPS_PROXY: "${DEV_PROXY}"
    NO_PROXY: "${DEV_PROXY_SKIP}"
    http_proxy: "${DEV_PROXY}"
    https_proxy: "${DEV_PROXY}"
    no_proxy: "${DEV_PROXY_SKIP}"
  artifacts:
    when: always
    expire_in: 3 days
    paths:
      - reports/
    reports:
      junit: reports/unittest-results.xml
      codequality: reports/code-quality-report.json

sync-to-github:
  stage: publish
  needs:
    - job: python-test
      artifacts: false
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == 'true'
      when: on_success
    - when: never
  image: ${DOCKER_HUB_PROXY}alpine/git:latest
  before_script:
    - git config --global http.proxy ${DEV_PROXY}
  script:
    - git checkout ${CI_COMMIT_BRANCH}
    - git pull --ff-only origin ${CI_COMMIT_BRANCH}
    - git remote add github https://${GITHUB_USER}:${GITHUB_TOKEN}@${GITHUB_REMOTE}
    - git push --force --follow-tags github ${CI_COMMIT_BRANCH}:${CI_COMMIT_BRANCH}
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "0"

