name: Python package

on: [push]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest --doctest-modules --junitxml=reports/unittest-results.xml tests/unit
      - name: Create unit tests report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Report
          path: reports/unittest-results.xml
          reporter: java-junit
      - name: Run integration tests
        run: python -m pytest --container-scope=session --doctest-modules --junitxml=reports/integration-test-results.xml tests/integration
      - name: Create integration tests report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Integration Test Report
          path: reports/integration-test-results.xml
          reporter: java-junit
      - name: Archive test reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-reports
          path: reports/*
          retention-days: 3
