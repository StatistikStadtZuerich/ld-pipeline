version: '3.1'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'password!Strong'
      MSSQL_TCP_PORT: '1433'
    ports:
      - '1433:1433'
    volumes:
      - ./data:/docker-entrypoint-initdb.d
